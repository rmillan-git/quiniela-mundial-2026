services:
  - type: web
    name: quiniela-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiniela-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: millan.ricardo@gmail.com

  - type: web
    name: quiniela-frontend
    runtime: static
    staticPublishPath: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: quiniela-db
    plan: free
    databaseName: quiniela
    user: quiniela
