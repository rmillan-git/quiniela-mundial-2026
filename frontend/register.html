<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login / Registro – Quiniela 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css?v=20260612" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-success">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">⚽ Quiniela Mundial 2026</a>
      <div class="d-flex gap-2 flex-wrap align-items-center">
        <span class="text-white-50 small wc-countdown"></span>
        <a href="groups.html" class="btn btn-outline-light btn-sm" data-i18n="nav.groups">Grupos</a>
        <a href="bracket.html" class="btn btn-outline-light btn-sm" data-i18n="nav.bracket">Bracket</a>
        <a href="index.html" class="btn btn-outline-light btn-sm" data-i18n="nav.leaderboard">Posiciones</a>
        <a href="all-predictions.html" class="btn btn-outline-light btn-sm" data-i18n="nav.allpreds">Todas las Quinielas</a>
        <button class="btn btn-outline-light btn-sm lang-btn">🇺🇸 EN</button>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">

        <!-- Login card -->
        <div class="card shadow-sm mb-4" id="card-login">
          <div class="card-body p-4">
            <h4 class="card-title mb-3" data-i18n="reg.login_title">Iniciar Sesión</h4>
            <div id="login-alert" class="alert d-none"></div>
            <form id="form-login">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="login-email" required>
              </div>
              <div class="mb-3">
                <label class="form-label" data-i18n-label="password">Contraseña</label>
                <input type="password" class="form-control" id="login-password" required>
              </div>
              <button type="submit" class="btn btn-success w-100" data-i18n="reg.login_btn">Entrar</button>
            </form>
            <p class="mt-3 text-center text-muted small">
              <span data-i18n="reg.no_account">¿No tienes cuenta?</span>
              <a href="#" id="show-register" data-i18n="reg.register_here">Regístrate aquí</a>
            </p>
          </div>
        </div>

        <!-- Register card -->
        <div class="card shadow-sm d-none" id="card-register">
          <div class="card-body p-4">
            <h4 class="card-title mb-3" data-i18n="reg.register_title">Crear Cuenta</h4>
            <div id="register-alert" class="alert d-none"></div>
            <form id="form-register">
              <div class="mb-3">
                <label class="form-label" data-i18n-label="name">Nombre</label>
                <input type="text" class="form-control" id="reg-name" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="reg-email" required>
              </div>
              <div class="mb-3">
                <label class="form-label" data-i18n-label="password">Contraseña</label>
                <input type="password" class="form-control" id="reg-password" required minlength="6">
              </div>
              <button type="submit" class="btn btn-success w-100" data-i18n="reg.register_btn">Registrarse</button>
            </form>
            <p class="mt-3 text-center text-muted small">
              <span data-i18n="reg.have_account">¿Ya tienes cuenta?</span>
              <a href="#" id="show-login" data-i18n="reg.login_link">Inicia sesión</a>
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/i18n.js?v=20260612"></script>
  <script src="js/api.js?v=20260612"></script>
  <script src="js/auth.js?v=20260612"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById("show-register").addEventListener("click", e => {
      e.preventDefault();
      document.getElementById("card-login").classList.add("d-none");
      document.getElementById("card-register").classList.remove("d-none");
    });
    document.getElementById("show-login").addEventListener("click", e => {
      e.preventDefault();
      document.getElementById("card-register").classList.add("d-none");
      document.getElementById("card-login").classList.remove("d-none");
    });

    document.getElementById("form-login").addEventListener("submit", async e => {
      e.preventDefault();
      const alertEl = document.getElementById("login-alert");
      alertEl.className = "alert d-none";
      const res = await api.login(
        document.getElementById("login-email").value,
        document.getElementById("login-password").value
      );
      if (res.error) {
        alertEl.textContent = res.error;
        alertEl.className = "alert alert-danger";
      } else {
        window.location.href = "predictions.html";
      }
    });

    document.getElementById("form-register").addEventListener("submit", async e => {
      e.preventDefault();
      const alertEl = document.getElementById("register-alert");
      alertEl.className = "alert d-none";
      const res = await api.post("/auth/register", {
        name: document.getElementById("reg-name").value,
        email: document.getElementById("reg-email").value,
        password: document.getElementById("reg-password").value,
      });
      if (res.detail) {
        alertEl.textContent = res.detail;
        alertEl.className = "alert alert-danger";
      } else {
        alertEl.textContent = t("reg.pending");
        alertEl.className = "alert alert-success";
        document.getElementById("form-register").reset();
      }
    });

    document.addEventListener("langchange", () => {
      applyTranslations();
    });
  </script>
</body>
</html>
