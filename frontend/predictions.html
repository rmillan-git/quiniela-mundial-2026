<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Predictions – Quiniela 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="sticky-top">
    <nav class="navbar navbar-dark bg-success">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html">⚽ Quiniela Mundial 2026</a>
        <div class="d-flex gap-2 flex-wrap align-items-center">
          <span class="text-white-50 small wc-countdown"></span>
          <a href="groups.html" class="btn btn-outline-light btn-sm" data-i18n="nav.groups">Grupos</a>
          <a href="bracket.html" class="btn btn-outline-light btn-sm" data-i18n="nav.bracket">Bracket</a>
          <a href="index.html" class="btn btn-outline-light btn-sm" data-i18n="nav.leaderboard">Posiciones</a>
          <a href="all-predictions.html" class="btn btn-outline-light btn-sm" data-i18n="nav.allpreds">Todas las Quinielas</a>
          <a href="register.html" class="btn btn-light btn-sm" id="nav-login" data-i18n="nav.login">Login / Registro</a>
          <a href="admin.html" class="btn btn-warning btn-sm d-none" id="nav-admin" data-i18n="nav.admin">Admin</a>
          <button class="btn btn-outline-light btn-sm d-none" id="btn-logout" data-i18n="nav.logout">Salir</button>
          <button class="btn btn-outline-light btn-sm lang-btn">🇺🇸 EN</button>
        </div>
      </div>
    </nav>
    <!-- Save bar — only visible when logged in -->
    <div id="save-bar" class="d-none bg-white border-bottom shadow-sm px-3 py-2 d-flex align-items-center gap-3">
      <button class="btn btn-success btn-sm" id="btn-save" data-i18n="pred.save">💾 Guardar Predicciones</button>
      <span id="save-status" class="text-muted small"></span>
      <div id="save-alert" class="mb-0 d-none alert py-1 px-2 small flex-grow-1"></div>
    </div>
  </div>

  <div class="container py-4">
    <h2 class="mb-1" data-i18n="pred.title">Mis Predicciones</h2>
    <p class="text-muted small">
      <span data-i18n="pred.sub">Se bloquean al inicio de cada partido</span> &nbsp;|&nbsp;
      <span class="badge bg-success">9 pts</span> <span data-i18n="pred.exact">marcador exacto</span> &nbsp;
      <span class="badge bg-primary">7 pts</span> <span data-i18n="pred.outcome">resultado correcto</span> &nbsp;
      <span class="badge bg-secondary">0 pts</span> <span data-i18n="pred.wrong">incorrecto</span>
    </p>

    <div id="auth-required" class="alert alert-warning d-none">
      <span data-i18n="pred.login_required">Inicia sesión para enviar predicciones.</span>
      <a href="register.html" data-i18n="nav.login">Login / Registro</a>
    </div>

    <div id="predictions-loading" class="text-center py-5">
      <div class="spinner-border text-success" role="status"></div>
    </div>

    <div id="predictions-content" class="d-none">
      <ul class="nav nav-tabs mb-3" id="round-tabs"></ul>
      <div id="matches-container"></div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function toLocalTime(utcStr) {
      const d = new Date(utcStr);
      // Show user's local time with timezone abbreviation
      const local = d.toLocaleString([], {
        month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit",
        timeZoneName: "short"
      });
      // Also show CST for reference
      const cst = d.toLocaleString("en-US", {
        timeZone: "America/Chicago",
        month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit",
        hour12: true
      });
      return `${local} <span class="text-muted">(${cst} CST)</span>`;
    }

    const PREDICTIONS_CLOSE = new Date("2026-06-11T17:00:00Z"); // Jun 11 12:00 PM CDT
    function isLocked(kickoffUtc) {
      return new Date() >= PREDICTIONS_CLOSE;
    }

    function validateScore(val) {
      const n = parseInt(val, 10);
      return !isNaN(n) && n >= 0 && n <= 20 && String(n) === String(val).trim();
    }

    async function load() {
      const user = await auth.getUser();
      if (!user) {
        document.getElementById("predictions-loading").classList.add("d-none");
        document.getElementById("auth-required").classList.remove("d-none");
        return;
      }

      const [matches, myPreds] = await Promise.all([
        api.get("/matches/"),
        api.get("/predictions/my"),
      ]);

      const predMap = {};
      myPreds.forEach(p => predMap[p.match_id] = p);

      // Build lookup: match_number → short team label for bracket context
      const numToLabel = {};
      matches.forEach(m => {
        const hTBD = !m.home_flag || m.home_flag === "🏳️";
        const aTBD = !m.away_flag || m.away_flag === "🏳️";
        const h = hTBD ? m.home_team : `${m.home_flag} ${m.home_team}`;
        const a = aTBD ? m.away_team : `${m.away_flag} ${m.away_team}`;
        numToLabel[m.match_number] = `${h} vs ${a}`;
      });

      enrichTeam = function(name) {
        const m = name.match(/P(\d{2,3})/);
        if (!m) return name;
        const ref = parseInt(m[1]);
        return numToLabel[ref] ? `${name} <span class="text-muted small">(${numToLabel[ref]})</span>` : name;
      };

      document.getElementById("predictions-loading").classList.add("d-none");
      document.getElementById("predictions-content").classList.remove("d-none");
      document.getElementById("save-bar").classList.remove("d-none");

      const rounds = ["group_stage", "round_of_32", "round_of_16", "qf", "sf", "final"];

      const tabsEl = document.getElementById("round-tabs");
      const containerEl = document.getElementById("matches-container");
      let firstActive = true;

      // Store group matches for live standings
      groupMatchesMap = {};
      matches.filter(m => m.round === "group_stage").forEach(m => {
        if (!groupMatchesMap[m.group]) groupMatchesMap[m.group] = [];
        groupMatchesMap[m.group].push(m);
      });

      rounds.forEach(round => {
        const roundMatches = matches.filter(m => m.round === round);
        if (!roundMatches.length) return;

        const label = t(`pred.round.${round}`);
        const active = firstActive ? "active" : "";
        firstActive = false;
        tabsEl.innerHTML += `<li class="nav-item"><a class="nav-link ${active}" data-bs-toggle="tab" href="#tab-${round}">${label}</a></li>`;

        let html = `<div class="tab-pane fade ${active ? "show active" : ""}" id="tab-${round}">`;

        if (round === "group_stage") {
          const groups = [...new Set(roundMatches.map(m => m.group))].sort();
          for (let i = 0; i < groups.length; i += 2) {
            html += '<div class="row g-3 mb-2">';
            for (let j = i; j < Math.min(i + 2, groups.length); j++) {
              const g = groups[j];
              html += '<div class="col-md-6">';
              html += `<h5 class="mt-2 mb-2 text-success">${window.LANG === "en" ? "Group" : "Grupo"} ${g}</h5>`;
              html += '<div class="d-flex gap-2 align-items-start">';
              html += '<div style="min-width:0;flex:1">';
              roundMatches.filter(m => m.group === g).forEach(m => html += matchCard(m, predMap));
              html += '</div>';
              html += `<div id="grp-standing-${g}" class="flex-shrink-0" style="width:175px"></div>`;
              html += '</div>';
              html += '</div>';
            }
            html += '</div>';
          }
        } else {
          const isTBD = roundMatches.every(m => !m.home_flag || m.home_flag === "🏳️");
          if (isTBD) {
            html += `<div class="alert alert-info py-2 small mb-3">
              ${window.LANG === "en"
                ? "⏳ Teams will be confirmed once previous round results are known. You can already enter your predictions!"
                : "⏳ Los equipos se confirmarán cuando terminen los resultados de la ronda anterior. ¡Ya puedes ingresar tus predicciones!"}
            </div>`;
          }
          roundMatches.forEach(m => html += matchCard(m, predMap));
        }
        html += "</div>";
        containerEl.innerHTML += html;
      });

      // Render initial standings (picks up saved predictions already in the inputs)
      Object.keys(groupMatchesMap).forEach(g => renderGroupStandings(g, groupMatchesMap[g]));

      // Live update as user types
      containerEl.addEventListener("input", e => {
        if (!e.target.classList.contains("pred-input")) return;
        const mid = parseInt(e.target.dataset.match);
        const m = matches.find(mx => mx.id === mid);
        if (!m || m.round !== "group_stage") return;
        renderGroupStandings(m.group, groupMatchesMap[m.group]);
      });
    }

    let groupMatchesMap = {};

    function calcGroupStandings(groupMatches) {
      const teams = {};
      groupMatches.forEach(m => {
        [["home_team","home_flag","home"],["away_team","away_flag","away"]].forEach(([tk,fk]) => {
          if (!teams[m[tk]]) teams[m[tk]] = { name: m[tk], flag: m[fk], p:0,w:0,d:0,l:0,gf:0,ga:0 };
        });
        const hEl = document.querySelector(`.pred-input[data-match="${m.id}"][data-side="home"]`);
        const aEl = document.querySelector(`.pred-input[data-match="${m.id}"][data-side="away"]`);
        const h = hEl ? parseInt(hEl.value) : NaN;
        const a = aEl ? parseInt(aEl.value) : NaN;
        if (isNaN(h) || isNaN(a) || h < 0 || a < 0) return;
        const ht = teams[m.home_team], at = teams[m.away_team];
        ht.p++; at.p++; ht.gf += h; ht.ga += a; at.gf += a; at.ga += h;
        if (h > a)      { ht.w++; at.l++; }
        else if (h < a) { at.w++; ht.l++; }
        else            { ht.d++; at.d++; }
      });
      return Object.values(teams)
        .map(t => ({ ...t, gd: t.gf - t.ga, pts: t.w * 3 + t.d }))
        .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name));
    }

    function renderGroupStandings(g, groupMatches) {
      const el = document.getElementById(`grp-standing-${g}`);
      if (!el) return;
      const sorted = calcGroupStandings(groupMatches);
      if (!sorted.some(t => t.p > 0)) { el.innerHTML = ""; return; }

      const lbl = window.LANG === "en" ? "📊 Projected" : "📊 Proyectado";
      let html = `<p class="text-muted mb-1 fst-italic" style="font-size:.7rem">${lbl}</p>
        <table class="table table-bordered mb-0" style="font-size:.72rem">
        <thead class="table-light"><tr>
          <th>${t("groups.col_team")}</th>
          <th class="text-center px-1">${t("groups.col_won")}</th>
          <th class="text-center px-1">${t("groups.col_drawn")}</th>
          <th class="text-center px-1">${t("groups.col_lost")}</th>
          <th class="text-center px-1">${t("groups.col_pts")}</th>
        </tr></thead><tbody>`;
      sorted.forEach((tm, i) => {
        const cls = i < 2 ? "table-success" : (i === 2 ? "table-warning" : "");
        const flag = tm.flag && tm.flag !== "🏳️" ? tm.flag : "";
        const name = tm.name.length > 9 ? tm.name.slice(0, 9) + "…" : tm.name;
        html += `<tr class="${cls}" title="${tm.name} — ${tm.gf}:${tm.ga} (DG ${tm.gd > 0 ? "+" : ""}${tm.gd})">
          <td class="px-1">${flag} ${name}</td>
          <td class="text-center px-1">${tm.w}</td>
          <td class="text-center px-1">${tm.d}</td>
          <td class="text-center px-1">${tm.l}</td>
          <td class="text-center px-1 fw-bold">${tm.pts}</td>
        </tr>`;
      });
      html += "</tbody></table>";
      el.innerHTML = html;
    }

    // Re-render standings on language change
    document.addEventListener("langchange", () => {
      Object.keys(groupMatchesMap).forEach(g => renderGroupStandings(g, groupMatchesMap[g]));
    });

    let enrichTeam = name => name; // overridden after matches load

    function teamLabel(flag, name) {
      if (flag && flag !== "🏳️") return `${flag} ${name}`;
      return `<span class="text-muted fst-italic">${enrichTeam(name)}</span>`;
    }

    function matchCard(m, predMap) {
      const locked = isLocked(m.kickoff_utc);
      const pred = predMap[m.id] || {};
      const ph = pred.home_score ?? "";
      const pa = pred.away_score ?? "";
      const scoreDisplay = m.is_finished
        ? `<span class="badge bg-secondary ms-1">${m.home_score}–${m.away_score}</span>` : "";
      const pts = pred.points != null
        ? `<span class="badge ${pred.points===9?"bg-success":pred.points===7?"bg-primary":"bg-secondary"} ms-1">${pred.points}pts</span>` : "";

      return `
        <div class="card mb-2 ${locked ? "border-secondary opacity-75" : "border-success border-opacity-25"}">
          <div class="card-body py-2 px-3">
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <span class="text-muted small">#${m.match_number}</span>
              <span class="fw-semibold">${teamLabel(m.home_flag, m.home_team)}</span>
              <input type="number" min="0" max="20" step="1"
                class="form-control form-control-sm pred-input text-center ${locked?"":"border-success"}"
                data-match="${m.id}" data-side="home"
                value="${ph}" ${locked ? "disabled" : "required"} style="width:62px"
                oninput="this.value=this.value.replace(/[^0-9]/g,'')">
              <span class="fw-bold">–</span>
              <input type="number" min="0" max="20" step="1"
                class="form-control form-control-sm pred-input text-center ${locked?"":"border-success"}"
                data-match="${m.id}" data-side="away"
                value="${pa}" ${locked ? "disabled" : "required"} style="width:62px"
                oninput="this.value=this.value.replace(/[^0-9]/g,'')">
              <span class="fw-semibold">${teamLabel(m.away_flag, m.away_team)}</span>
              ${scoreDisplay}${pts}
            </div>
            <div class="d-flex justify-content-between align-items-center mt-1 flex-wrap gap-1">
              <span class="text-muted small">📍 ${m.venue || ""}</span>
              <span class="small">${toLocalTime(m.kickoff_utc)}</span>
              ${locked ? `<span class="badge bg-secondary">${t("pred.locked")}</span>` : ""}
            </div>
          </div>
        </div>`;
    }

    document.getElementById("btn-save").addEventListener("click", async () => {
      const inputs = document.querySelectorAll(".pred-input:not([disabled])");
      const matchPreds = {};
      let hasInvalid = false;

      inputs.forEach(inp => {
        const mid = inp.dataset.match;
        matchPreds[mid] = matchPreds[mid] || {};
        const val = inp.value.trim();
        if (!validateScore(val)) {
          inp.classList.add("is-invalid");
          hasInvalid = true;
        } else {
          inp.classList.remove("is-invalid");
          matchPreds[mid][inp.dataset.side] = parseInt(val, 10);
        }
      });

      const alertEl = document.getElementById("save-alert");
      if (hasInvalid) {
        alertEl.className = "alert alert-danger";
        alertEl.textContent = t("pred.invalid");
        alertEl.classList.remove("d-none");
        return;
      }

      const status = document.getElementById("save-status");
      status.textContent = t("pred.saving");
      alertEl.className = "alert d-none";
      let saved = 0, errors = 0;

      for (const [mid, scores] of Object.entries(matchPreds)) {
        if (scores.home == null || scores.away == null) continue;
        const res = await api.put(`/predictions/${mid}`, { home_score: scores.home, away_score: scores.away });
        res.ok ? saved++ : errors++;
      }

      alertEl.className = `alert ${errors ? "alert-warning" : "alert-success"}`;
      alertEl.textContent = errors
        ? `${saved} ${t("pred.saved_ok")} — ${t("pred.saved_err")} ${errors}.`
        : `✅ ${saved} ${t("pred.saved_ok")}`;
      alertEl.classList.remove("d-none");
      status.textContent = "";
    });

    load();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
