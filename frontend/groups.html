<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grupos – Quiniela 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-success">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">⚽ Quiniela Mundial 2026</a>
      <div class="d-flex gap-2 flex-wrap align-items-center">
        <span class="text-white-50 small wc-countdown"></span>
        <a href="bracket.html" class="btn btn-outline-light btn-sm" data-i18n="nav.bracket">Bracket</a>
        <a href="predictions.html" class="btn btn-outline-light btn-sm" data-i18n="nav.predictions">Mis Predicciones</a>
        <a href="index.html" class="btn btn-outline-light btn-sm" data-i18n="nav.leaderboard">Posiciones</a>
        <a href="all-predictions.html" class="btn btn-outline-light btn-sm" data-i18n="nav.allpreds">Todas las Quinielas</a>
        <a href="register.html" class="btn btn-light btn-sm" id="nav-login" data-i18n="nav.login">Login / Registro</a>
        <a href="admin.html" class="btn btn-warning btn-sm d-none" id="nav-admin" data-i18n="nav.admin">Admin</a>
        <button class="btn btn-outline-light btn-sm d-none" id="btn-logout" data-i18n="nav.logout">Salir</button>
        <button class="btn btn-outline-light btn-sm lang-btn">🇺🇸 EN</button>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="mb-3" data-i18n="groups.title">Tablas de Grupos</h2>
    <div id="loading" class="text-center py-5"><div class="spinner-border text-success" role="status"></div></div>
    <div id="groups-container" class="row row-cols-1 row-cols-md-2 g-3"></div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script>
    async function load() {
      const data = await api.get("/leaderboard/groups");
      document.getElementById("loading").classList.add("d-none");
      const container = document.getElementById("groups-container");
      container.innerHTML = "";
      const groups = Object.keys(data).sort();

      if (!groups.length) {
        container.innerHTML = `<div class="col"><p class="text-muted">${t("groups.empty")}</p></div>`;
        return;
      }

      groups.forEach(g => {
        const teams = data[g];
        let rows = teams.map((tm, i) => {
          const qual = i < 2 ? "table-success" : (i === 2 ? "table-warning" : "");
          const gd = tm.gf - tm.ga;
          return `<tr class="${qual}">
            <td>${i + 1}</td>
            <td>${tm.flag} ${tm.team}</td>
            <td class="text-center">${tm.played}</td>
            <td class="text-center">${tm.won}</td>
            <td class="text-center">${tm.drawn}</td>
            <td class="text-center">${tm.lost}</td>
            <td class="text-center">${tm.gf}</td>
            <td class="text-center">${tm.ga}</td>
            <td class="text-center">${gd >= 0 ? "+" : ""}${gd}</td>
            <td class="text-center fw-bold">${tm.pts}</td>
          </tr>`;
        }).join("");

        const groupLabel = window.LANG === "en" ? `Group ${g}` : `Grupo ${g}`;
        container.innerHTML += `
          <div class="col">
            <div class="card">
              <div class="card-header bg-success text-white fw-bold">${groupLabel}</div>
              <div class="table-responsive">
                <table class="table table-sm mb-0">
                  <thead><tr>
                    <th>#</th><th>${t("groups.col_team")}</th>
                    <th class="text-center">${t("groups.col_played")}</th>
                    <th class="text-center">${t("groups.col_won")}</th>
                    <th class="text-center">${t("groups.col_drawn")}</th>
                    <th class="text-center">${t("groups.col_lost")}</th>
                    <th class="text-center">${t("groups.col_gf")}</th>
                    <th class="text-center">${t("groups.col_ga")}</th>
                    <th class="text-center">${t("groups.col_gd")}</th>
                    <th class="text-center">${t("groups.col_pts")}</th>
                  </tr></thead>
                  <tbody>${rows}</tbody>
                </table>
              </div>
            </div>
          </div>`;
      });
    }

    document.addEventListener("langchange", load);
    load();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
